# This workflow builds a Java project with Maven and caches dependencies to improve execution time.
# For more details, see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

name: Java CI with Maven

on:
  push:
  #   branches: [ "master" ]
  # pull_request:
  #   branches: [ "master" ]

jobs:
  publish-job:
    runs-on: ubuntu-latest

    steps:
      # Checkout the code
      - uses: actions/checkout@v4

      # Set up Node.js for React build
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: src/main/frontend/package-lock.json

      # Install dependencies and build React app
      - name: Build React frontend
        run: |
          find src/main/resources -type f -exec md5sum {} + | md5sum > before_build.md5 || echo "Not exist"
          cd src/main/frontend
          npm install
          npm run build
          cd ../../../
          find src/main/resources -type f -exec md5sum {} + | md5sum > after_build.md5
          if cmp -s before_build.md5 after_build.md5; then
            echo "MD5 checksums are the same, no changes detected in index.html."
          else
            echo "MD5 checksums are different, React build updated index.html."
          fi

      # Set up Java JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Build the Java backend with Maven
      - name: Build with Maven
        run: mvn -B package --file pom.xml -DskipTests=true

      # Copy build artifacts to a staging directory
      - name: Prepare artifacts
        run: |
          mkdir staging
          cp .env database.sql target/doan-0.0.1-SNAPSHOT.jar staging
          cp -r src/main/resources/static staging/frontend

      # List staging directory
      - name: List staging directory
        run: ls -lRa staging

      # Upload artifacts
      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: Java and React Package
          path: staging
          include-hidden-files: true
